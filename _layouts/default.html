<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ site.description }}" />

  <!-- use default color scheme -->
  <script>
    const saved = localStorage.getItem('theme');
    document.documentElement.setAttribute('data-theme', saved ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
  </script>

  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
  <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <!-- navbar -->
  <header class="navbar">
    <div class="wrapper nav-container">
      <a href="/" class="nav-logo">kyle luong</a>
      <div class="nav-right">
        <nav class="nav-links" id="nav-links">
          <a href="/experience/" {% if page.url == '/experience/' %}class="nav-active"{% endif %}>experience</a>
          <a href="/projects/" {% if page.url == '/projects/' %}class="nav-active"{% endif %}>projects</a>
          <a href="/publications/" {% if page.url == '/publications/' %}class="nav-active"{% endif %}>publications</a>
          <a href="/about/" {% if page.url == '/about/' %}class="nav-active"{% endif %}>about</a>
        </nav>
        <button id="hamburger" class="hamburger-btn" aria-label="Toggle menu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <button id="toggle-theme" class="theme-toggle" aria-label="Toggle theme">
          <svg class="theme-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 3a9 9 0 0 0 0 18 9 9 0 0 0 0-18zM2 12a10 10 0 1 1 20 0 10 10 0 0 1-20 0z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- main -->
  <main class="wrapper content">
    {{ content }}
  </main>

  <script>
    const navLinks = document.getElementById('nav-links');
    document.getElementById('hamburger').addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(link => link.addEventListener('click', () => navLinks.classList.remove('open')));

    document.getElementById('toggle-theme').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>

  <!-- footer -->
  <footer class="site-footer">
    <div class="wrapper footer-container">
      <div class="footer-left">kyle luong</div>
      <div class="footer-contact">
        <a href="mailto:kylewfl@gmail.com" aria-label="Email">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </a>
        <span>·</span>
        <a href="https://linkedin.com/in/kylewl" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect width="4" height="12" x="2" y="9"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
        <span>·</span>
        <a href="https://scholar.google.com/citations?user=0EMHv1kAAAAJ&hl=en" target="_blank" rel="noopener" aria-label="Google Scholar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </a>
        <span>·</span>
        <a href="https://github.com/kyle-luong" target="_blank" rel="noopener" aria-label="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
            <path d="M9 18c-4.51 2-5-2-7-2"/>
          </svg>
        </a>
      </div>
      <div class="footer-right" id="time">Loading time...</div>
    </div>
  </footer>

  <script>
    const timeEl = document.getElementById('time');
    const tick = () => timeEl.textContent = new Date().toLocaleTimeString('en-US', {
      timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
    tick();
    setInterval(tick, 1000);
  </script>

</body>

</html>
